<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up for Clip Clap</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Create an Account</h2>
        <div class="login-box">
            <form id="signupForm">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" required>
                
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required>
                
                <button type="submit" class="btn-signin">Sign up</button>
            </form>
        </div>
        <div class="signup-box">
            <p>Already have an account? <a href="login.html">Sign in</a>.</p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('regUsername').value;
            const pass = document.getElementById('regPassword').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.username === user)) {
                alert("Username already exists.");
                return;
            }
            const newUser = {id: Date.now(), username: user, password: pass};
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            // If no site owner defined yet, make this user the owner
            if (!localStorage.getItem('siteOwnerId')) {
                localStorage.setItem('siteOwnerId', String(newUser.id));
            }
            alert("Account created! Redirecting to login...");
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
