<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notifications</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">
  <div class="login-container">
    <h2>Notifications</h2>
    <div id="notes"></div>
    <p><a href="../../index.html">Back</a></p>
  </div>
  <script>
    const notes = JSON.parse(localStorage.getItem('notifications') || '[]');
    const container = document.getElementById('notes');
    if (!notes.length) container.innerText = 'No notifications';
    notes.forEach((n, i) => {
      const div = document.createElement('div');
      div.innerHTML = `<p>${n.text}</p><button>Mark Read</button>`;
      div.querySelector('button').onclick = () => { notes.splice(i,1); localStorage.setItem('notifications', JSON.stringify(notes)); location.reload(); };
      container.appendChild(div);
    });
  </script>
</body>
</html>
