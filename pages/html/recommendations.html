<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recommendations</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">
  <div class="login-container">
    <h2>Recommended Servers</h2>
    <div id="recs"></div>
    <p><a href="../../index.html">Back</a></p>
  </div>
  <script>
    const recs = JSON.parse(localStorage.getItem('servers') || '[]').filter(s => !s.starred);
    const container = document.getElementById('recs');
    recs.forEach(s => {
      const div = document.createElement('div');
      div.innerHTML = `<strong>${s.name}</strong><p>${s.description || ''}</p>`;
      const btn = document.createElement('button'); btn.textContent = 'Star & Join';
      btn.onclick = () => { s.starred = true; const ss = JSON.parse(localStorage.getItem('servers') || '[]'); const i = ss.findIndex(x => x.id===s.id); if (i>=0) { ss[i]=s; localStorage.setItem('servers', JSON.stringify(ss)); } location.href='../../index.html'; };
      div.appendChild(btn);
      container.appendChild(div);
    });
  </script>
</body>
</html>
